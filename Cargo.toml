[package]
name = "shorten"
version = "0.1.0"
edition = "2024"
default-run = "shorten"

[dependencies]
axum = "0.8"
base64 = "0.22"
chrono = "0.4"
clap = { version = "4.6", features = ["derive", "string"] }
hex = "0.4"
log = { version = "0.4", features = ["std"] }
percent-encoding = "2.3"
rand = "0.10"
rusqlite = "0.39"
sha2 = "0.11"
thiserror = "2.0"
tokio = { version = "1.52", features = ["macros", "net", "rt-multi-thread"] }
url = "2.5"

[build-dependencies]
chrono = "0.4"

[features]
bundled-sqlite = ["rusqlite/bundled"]
