name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      stable: true
      profile: release
      cache: false

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}
    permissions:
      artifact-metadata: write # for generating build provenance
      attestations: write # for generating build provenance
      contents: write # for creating tag and release
      id-token: write # for generating build provenance
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Generate build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: artifacts/**/*.tar.gz
      - name: Create bot token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Create tag
        run: |
          gh api "/repos/$GITHUB_REPOSITORY/git/refs" \
            -f "ref=refs/tags/v$VERSION" \
            -f "sha=$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ needs.build.outputs.version }}
      - name: Create release
        run: |
          gh release create "v$VERSION" \
            --latest \
            --title "$VERSION" \
            --generate-notes \
            artifacts/**/*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.build.outputs.version }}

  publish-crate:
    name: Publish crate
    needs: [build, release]
    runs-on: ubuntu-latest
    environment:
      name: crates.io
      url: https://crates.io/crates/shortener/${{ needs.build.outputs.version }}
    permissions:
      contents: read
      id-token: write # for authenticating to crates.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Perform release checks
        run: cargo publish --dry-run
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  bump-homebrew-formula:
    name: Bump Homebrew formula
    needs: [build, release]
    runs-on: macos-latest
    environment:
      name: release
      deployment: false
    steps:
      - name: Create bot token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write
      - name: Configure Git user
        run: |
          BOT_LOGIN="${APP_SLUG}[bot]"
          BOT_ID="$(gh api "/users/$BOT_LOGIN" --jq '.id')"
          {
            echo "HOMEBREW_GIT_NAME=$BOT_LOGIN"
            echo "HOMEBREW_GIT_EMAIL=$BOT_ID+$BOT_LOGIN@users.noreply.github.com"
          } >> "$GITHUB_ENV"
        env:
          APP_SLUG: ${{ steps.token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
      - name: Bump Homebrew formula
        run: |
          brew tap zhongruoyu/tap
          brew bump-formula-pr --no-fork \
            --version "$VERSION" \
            zhongruoyu/tap/shortener
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ needs.build.outputs.version }}
